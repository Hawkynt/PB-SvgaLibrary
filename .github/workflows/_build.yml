name: Build artifacts

# Reusable build: assembles the library into a linkable SVGA.PBL with the real
# PowerBASIC 3.5 toolchain under DOSBox (each .SUB -> a $COMPILE UNIT, PBLIB ->
# SVGA.PBL), verifies it by linking a self-test that round-trips a pixel, and
# uploads SVGA.PBL + the SVGA.BI interface (plus the .SUB sources) as an
# artifact. Called by ci.yml (advisory), nightly.yml and release.yml.
#
# advisory=true  -> a missing toolchain or a build/link failure leaves the job
#                   GREEN and produces no artifact (CI; the structural check is
#                   the required gate).
# advisory=false -> either of those FAILS the job, so no broken bundle ships.
on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
        default: 'dev'
      advisory:
        required: false
        type: boolean
        default: false
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact containing the library bundle"
        value: ${{ jobs.build.outputs.artifact-name }}
      built:
        description: "true if the library compiled and was bundled"
        value: ${{ jobs.build.outputs.built }}

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: svga-library-${{ inputs.version }}
      built: ${{ steps.compile.outcome == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Obtain PowerBASIC toolchain
        id: tc
        continue-on-error: true
        env:
          PB_TOOLCHAIN_KEY: ${{ secrets.PB_TOOLCHAIN_KEY }}
        run: |
          mkdir -p pb
          if [ -f tools/pb-toolchain.tar.gz ]; then
            tar xzf tools/pb-toolchain.tar.gz -C pb
          elif [ -f tools/pb-toolchain.tar.enc ] && [ -n "$PB_TOOLCHAIN_KEY" ]; then
            openssl enc -d -aes-256-cbc -pbkdf2 -in tools/pb-toolchain.tar.enc -pass env:PB_TOOLCHAIN_KEY | tar xz -C pb
          else
            echo "::notice::PowerBASIC toolchain unavailable."; exit 1
          fi

      - name: Require toolchain (non-advisory builds)
        if: ${{ inputs.advisory != true && steps.tc.outcome == 'failure' }}
        run: echo "::error::PowerBASIC toolchain required - commit tools/pb-toolchain.tar.enc and set PB_TOOLCHAIN_KEY."; exit 1

      - name: Install DOSBox
        if: steps.tc.outcome == 'success'
        run: sudo apt-get update && sudo apt-get install -y dosbox

      - name: Build SVGA.PBL under DOSBox
        id: compile
        if: steps.tc.outcome == 'success'
        continue-on-error: true
        run: |
          # The whole library exceeds PB/DOS's 64k-per-compilation-unit limit, so it
          # is built as separately-compiled $COMPILE UNITs assembled into SVGA.PBL.
          # scripts/build-pbl.py derives the units + interface (SVGA.BI/SVGAINT.BI)
          # + the PBLIB librarian script + a link-and-run self-test from the .SUB.
          python3 scripts/gen-vesaopt.py
          python3 scripts/build-pbl.py . build
          cp pb/* build/
          {
            echo "[cpu]"; echo "core=dynamic"; echo "cycles=max"
            echo "[autoexec]"; echo "mount c \"$(pwd)/build\""; echo "c:"
            for u in $(cat build/UNITS.txt); do echo "PBC.EXE -CU -G386 -FNPX $u.BAS >> CLOG.TXT"; done
            echo "PBLIB.EXE < PBLIB.IN"
            echo "PBC.EXE -CE -G386 -FNPX SELFTEST.BAS >> CLOG.TXT"
            echo "SELFTEST.EXE"
            echo "EXIT"
          } > build/dosbox.conf
          SDL_VIDEODRIVER=dummy timeout 600 dosbox -conf build/dosbox.conf -exit >/dev/null 2>&1 || true
          echo "=== compile/link log ==="; cat build/CLOG.TXT 2>/dev/null || true
          echo "=== link-and-run self-test ==="; cat build/O.TXT 2>/dev/null || true
          expected=$(wc -l < build/UNITS.txt); actual=$(ls build/*.PBU 2>/dev/null | wc -l)
          if [ "$actual" -ne "$expected" ]; then echo "::error::only $actual of $expected units compiled to .PBU - a unit was skipped or failed."; exit 1; fi
          if [ ! -f build/SVGA.PBL ]; then echo "::error::SVGA.PBL was not produced (see log)."; exit 1; fi
          if grep -qiE "Error [0-9]+:" build/CLOG.TXT 2>/dev/null; then echo "::error::a unit failed to compile or the .PBL failed to link - see log."; exit 1; fi
          if ! grep -q "PIXEL_ROUNDTRIP_OK" build/O.TXT 2>/dev/null; then echo "::error::SVGA.PBL link-and-run self-test did not round-trip a pixel."; exit 1; fi
          echo "SVGA.PBL built ($(wc -c < build/SVGA.PBL) bytes) and the link-and-run self-test round-tripped a mode-13h pixel."

      - name: Require successful compile (non-advisory builds)
        if: ${{ inputs.advisory != true && steps.tc.outcome == 'success' && steps.compile.outcome == 'failure' }}
        run: echo "::error::library failed to compile."; exit 1

      - name: Compile and smoke-run the demos against SVGA.PBL
        id: demos
        if: steps.compile.outcome == 'success'
        continue-on-error: true
        run: |
          # every demo is a real .PBL consumer: compile it, run it with the
          # SMOKE argument (a deterministic input-free gameplay run) and require
          # the SMOKE.OK file it writes on clean completion
          rm -rf dbuild && mkdir -p dbuild
          fail=0
          for d in demos/*/; do
            name=$(basename "$d")
            work="dbuild/$name"
            mkdir -p "$work"
            cp "$d"* "$work"/ 2>/dev/null || true
            cp build/SVGA.PBL build/SVGA.BI build/SVGATYPE.BI build/SVGADECL.BI "$work"/
            cp pb/* "$work"/
            main=$(ls "$work"/*.BAS | head -1); main=$(basename "$main")
            exe="${main%.BAS}"
            {
              echo "[cpu]"; echo "core=dynamic"; echo "cycles=max"
              echo "[autoexec]"; echo "mount c \"$(pwd)/$work\""; echo "c:"
              echo "PBC.EXE -CE -G386 -FNPX $main >> DLOG.TXT"
              echo "$exe SMOKE > RUN.TXT"
              echo "EXIT"
            } > "$work/dosbox.conf"
            SDL_VIDEODRIVER=dummy timeout 240 dosbox -conf "$work/dosbox.conf" -exit >/dev/null 2>&1 || true
            if [ ! -f "$work/SMOKE.OK" ]; then
              # hosted runners occasionally stall a DOSBox session - one retry
              # distinguishes a flake from a real failure
              echo "demo $name: no SMOKE.OK, retrying once"
              SDL_VIDEODRIVER=dummy timeout 240 dosbox -conf "$work/dosbox.conf" -exit >/dev/null 2>&1 || true
            fi
            if [ -f "$work/SMOKE.OK" ]; then
              echo "demo $name: SMOKE-OK"
            else
              echo "::error::demo $name failed its smoke run (no SMOKE.OK)"; echo "--- runtime output ---"; cat "$work/RUN.TXT" 2>/dev/null; echo "--- compile log tail ---"; cat "$work/DLOG.TXT" 2>/dev/null | tail -8; fail=1
            fi
          done
          exit $fail

      - name: Require green demos (non-advisory builds)
        if: ${{ inputs.advisory != true && steps.compile.outcome == 'success' && steps.demos.outcome == 'failure' }}
        run: echo "::error::a demo failed to compile or smoke-run."; exit 1

      - name: Bundle the linkable library
        if: steps.compile.outcome == 'success'
        run: |
          # The published package is exactly what a consumer needs and nothing
          # more: the compiled SVGA.PBL, the interface it $INCLUDEs
          # ($INCLUDE "SVGA.BI" : $LINK "SVGA.PBL" - SVGA.BI pulls in
          # SVGATYPE.BI and SVGADECL.BI), the README and the LICENSE. Anyone
          # wanting the sources uses the repository itself.
          mkdir -p dist/svga
          cp build/SVGA.PBL build/SVGA.BI build/SVGATYPE.BI build/SVGADECL.BI dist/svga/
          cp README.md LICENSE dist/svga/
          (cd dist/svga && zip -r ../svga-library.zip .)
          ls -l dist dist/svga

      - uses: actions/upload-artifact@v4
        if: steps.compile.outcome == 'success'
        with:
          name: svga-library-${{ inputs.version }}
          path: dist/svga-library.zip
          if-no-files-found: error
