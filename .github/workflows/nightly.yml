name: Nightly

# Fires after CI passes on main, plus manual dispatch. Builds the library via
# the reusable _build.yml (which only succeeds when the library compiles under
# PowerBASIC 3.5) and publishes the directly-usable source-include bundle as a
# rolling nightly pre-release. Until the PB 3.5 port lands on main the build
# fails and the nightly simply produces nothing.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/_build.yml
    with:
      version: nightly
      # the nightly is the drift-catcher: a broken unit/.PBL build MUST turn it
      # red (CI keeps its advisory build for fast feedback; releases also gate)
      advisory: false
    secrets: inherit

  publish:
    needs: build
    if: ${{ needs.build.outputs.built == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist
      - name: Publish rolling nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: Nightly (${{ github.sha }})
          prerelease: true
          files: dist/svga-library.zip
          body: |
            Automated nightly bundle of the PowerBASIC 3.5 source-include SVGA library
            (`$INCLUDE "SVGA.SUB"`). Commit ${{ github.sha }}.
