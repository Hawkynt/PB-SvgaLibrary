name: Release

# Stable release - MANUAL dispatch only. Builds the library via the reusable
# _build.yml (where the PowerBASIC 3.5 compile is REQUIRED) and publishes the
# directly-usable source-include library bundle as a GitHub release asset.
# (Once the multi-unit SVGA.PBL build lands, attach the compiled .PBL here too.)
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version override (defaults to %SVGA_VERSION_* from TYPES.SUB).'
        required: false
      reason:
        description: 'Why are you cutting this release? (optional, for the audit log)'
        required: false

permissions:
  contents: write

# Force JavaScript-based actions to run on Node 24 instead of the deprecated Node 20 ahead of
# the 2026-06-16 hard cutover, until we bump each action to a Node-24-native major version.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # Required structural gate before we spend time on the real build.
  check:
    uses: ./.github/workflows/ci.yml

  version:
    needs: check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          # the source is the single version authority (TYPES.SUB %SVGA_VERSION_*,
          # exposed at runtime via Svga_Version$); the input only overrides it
          V="${{ github.event.inputs.version }}"
          [ -n "$V" ] || V=$(awk '/%SVGA_VERSION_MAJOR/{ma=$3} /%SVGA_VERSION_MINOR/{mi=$3} /%SVGA_VERSION_PATCH/{pa=$3} END{printf "%d.%d.%d", ma, mi, pa}' TYPES.SUB)
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Releasing v$V"

  build:
    needs: version
    uses: ./.github/workflows/_build.yml
    with:
      version: ${{ needs.version.outputs.version }}
    secrets: inherit

  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist
      - name: Compose release notes
        env:
          V: ${{ needs.version.outputs.version }}
        run: |
          cat > RELEASE_NOTES.md <<EOF
          ## PB-SvgaLibrary v$V

          The compiled **PowerBASIC 3.5 SVGA library**: \`SVGA.PBL\` plus its
          \`SVGA.BI\` interface (with \`SVGATYPE.BI\`/\`SVGADECL.BI\`), README and
          LICENSE. Consume it with \`\$INCLUDE "SVGA.BI"\` and \`\$LINK "SVGA.PBL"\` -
          the runtime version is available in-program via \`Svga_Version\$\`.
          EOF
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: v${{ needs.version.outputs.version }}
          files: dist/svga-library.zip
          body_path: RELEASE_NOTES.md
